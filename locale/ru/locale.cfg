[mod-name]
Krastorio2RFAC=Krastorio 2 Rocket Fuel in Advanced Chemical Plant

[mod-description]
Krastorio2RFAC="Krastorio 2 Ракетное топливо на продвинутом хим.заводе".\nНебольшая модификация позволяющая на Продвинутом химическом заводе выполнять очистку топлива, атмосферную конденсацию, электролиз и фильтрацию. Также добавлены рецепты дробления (песок и имерситовый порошок) для Продвинутый сборочный автомат. Требуется Krastorio 2. Совместимо с Space Exploration.
